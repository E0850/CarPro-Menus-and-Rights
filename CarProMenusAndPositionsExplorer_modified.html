      return new TextDecoder('utf-8').decode(bytes);

    async function loadPositionsFrame() {
      try {
        const response = await fetch('Positions.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status + ' while loading Positions.json');
        const positionsData = await response.json();
        const finalHtml = positionsTemplateHtml.replace('__POSITIONS_JSON_PLACEHOLDER__', JSON.stringify(positionsData));
        document.getElementById('frame-positions').srcdoc = finalHtml;
      } catch (error) {
        const errorHtml = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Positions Load Error</title><style>body{font-family:Arial,sans-serif;padding:16px;color:#333} code{background:#f3f3f3;padding:2px 4px}</style></head><body><h3>Could not load <code>Positions.json</code></h3><p>${String(error)}</p><p>Keep <code>CarProMenusAndPositionsExplorer.html</code> and <code>Positions.json</code> in the same folder.</p></body></html>`;
        document.getElementById('frame-positions').srcdoc = errorHtml;
      }
    }

    loadPositionsFrame();

    const buttons = Array.from(document.querySelectorAll('.tab-btn'));
    const panes = {
      menus: document.getElementById('pane-menus'),
      positions: document.getElementById('pane-positions')
    };

    function showPane(name) {
      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.pane === name));
      Object.entries(panes).forEach(([key, pane]) => pane.classList.toggle('active', key === name));
    }

    buttons.forEach(btn => btn.addEventListener('click', () => showPane(btn.dataset.pane)));
  </script>
</body>
</html>
